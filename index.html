<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Typing Assessment System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Typing Assessment System</h1>

        <div class="stats">

            <div class="card">
                <h3>Time</h3>
                <p><span id="time">60</span>s</p>
            </div>

            <div class="card">
                <h3>WPM</h3>
                <p><span id="wpm">0</span></p>
            </div>

            <div class="card">
                <h3>CPM</h3>
                <p><span id="cpm">0</span></p>
            </div>

            <div class="card">
                <h3>Accuracy</h3>
                <p><span id="accuracy">100</span>%</p>
            </div>

            <div class="card">
                <h3>Mistakes</h3>
                <p><span id="mistakes">0</span></p>
            </div>

        </div>

        <div class="text-box" id="paragraph">
            Loading paragraph...
        </div>

        <input
            type="text"
            id="input"
            placeholder="Start typing here..."
            autocomplete="off"
            autofocus>

        <div class="buttons">
            <button onclick="restart()">Restart Test</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
